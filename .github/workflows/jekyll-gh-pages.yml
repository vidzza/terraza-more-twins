# Despliega el sitio estático (carpeta /public) a GitHub Pages — sin Jekyll
name: Deploy static site to GitHub Pages

on:
  # Se ejecuta en cada push a la rama principal
  push:
    branches: ["main"]
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

# Permisos que necesita el GITHUB_TOKEN para publicar en Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue concurrente; no cancela el que esté en progreso
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publica solo la carpeta del sitio estático
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
